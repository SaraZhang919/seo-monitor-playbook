<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Monitoring Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* ─── Design tokens ──────────────────────────────────────── */
:root {
  --bg-p:    #ffffff;
  --bg-s:    #f5f4f2;
  --bg-t:    #edebe8;
  --tx-p:    #111827;
  --tx-s:    #6b7280;
  --tx-t:    #9ca3af;
  --bd-t:    rgba(0,0,0,0.08);
  --bd-s:    rgba(0,0,0,0.15);
  --tx-ok:   #16a34a; --bg-ok:   #f0fdf4; --bd-ok:   #86efac;
  --tx-err:  #dc2626; --bg-err:  #fef2f2; --bd-err:  #fca5a5;
  --tx-warn: #d97706; --bg-warn: #fffbeb; --bd-warn: #fde68a;
  --tx-info: #2563eb; --bg-info: #eff6ff; --bd-info: #93c5fd;
  --radius:  8px;  --radius-lg: 12px;
  --font:    -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-p:    #1c1c1e; --bg-s: #2c2c2e; --bg-t: #3a3a3c;
    --tx-p:    #f2f2f7; --tx-s: #9ca3af; --tx-t: #636366;
    --bd-t:    rgba(255,255,255,0.08); --bd-s: rgba(255,255,255,0.15);
    --tx-ok:   #4ade80; --bg-ok:   #052e16; --bd-ok:   #166534;
    --tx-err:  #f87171; --bg-err:  #450a0a; --bd-err:  #991b1b;
    --tx-warn: #fbbf24; --bg-warn: #451a03; --bd-warn: #92400e;
    --tx-info: #60a5fa; --bg-info: #0c1445; --bd-info: #1d4ed8;
  }
}

/* ─── Reset & base ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 18px; }
body {
  font-family: var(--font);
  background: var(--bg-s);
  color: var(--tx-p);
  min-height: 100vh;
  padding: 2rem 1rem;
}

/* ─── Layout ─────────────────────────────────────────────── */
.wrap { max-width: 860px; margin: 0 auto; }
.hdr {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 12px;
  flex-wrap: wrap; margin-bottom: 1.5rem;
}
.hdr h1 { font-size: 18px; font-weight: 500; color: var(--tx-p); }
.hdr p  { font-size: 13px; color: var(--tx-s); margin-top: 3px; }
.hdr-right { display: flex; gap: 8px; align-items: center; }

/* ─── Summary cards ──────────────────────────────────────── */
.sum-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px; margin-bottom: 1.5rem;
}
@media (max-width: 480px) { .sum-grid { grid-template-columns: repeat(2, 1fr); } }
.sum-c { background: var(--bg-p); border: 0.5px solid var(--bd-t); border-radius: var(--radius); padding: 10px 14px; }
.sum-n { font-size: 22px; font-weight: 500; color: var(--tx-p); }
.sum-l { font-size: 11px; color: var(--tx-s); margin-top: 2px; }

/* ─── Tabs ───────────────────────────────────────────────── */
.tabs {
  display: flex; gap: 5px;
  background: var(--bg-p); border: 0.5px solid var(--bd-t);
  padding: 3px; border-radius: var(--radius);
  width: fit-content; margin-bottom: 1.25rem;
}
.tab {
  padding: 6px 18px; border-radius: 6px; border: none;
  background: transparent; cursor: pointer;
  font-size: 13px; font-weight: 400; color: var(--tx-s);
  font-family: var(--font); transition: all .15s;
}
.tab.active {
  background: var(--bg-s); color: var(--tx-p);
  font-weight: 500; border: 0.5px solid var(--bd-t);
}

/* ─── Progress ───────────────────────────────────────────── */
.prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
.prog-bg  { flex: 1; height: 5px; background: var(--bg-t); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--tx-ok); transition: width .3s ease; }
.prog-txt { font-size: 12px; color: var(--tx-s); min-width: 72px; text-align: right; }

/* ─── Category block ─────────────────────────────────────── */
.cat-block {
  border: 0.5px solid var(--bd-t); border-radius: var(--radius-lg);
  overflow: hidden; margin-bottom: .875rem;
  background: var(--bg-p);
}
.cat-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--bg-s);
  cursor: pointer; user-select: none;
}
.cat-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: var(--tx-p); }
.cat-title i { font-size: 16px; color: var(--tx-s); }
.cat-right { display: flex; align-items: center; gap: 8px; }
.cat-cnt   { font-size: 11px; color: var(--tx-s); }
.chev { font-size: 13px; color: var(--tx-s); transition: transform .2s; display: inline-block; }
.chev.open { transform: rotate(180deg); }

/* ─── Item ───────────────────────────────────────────────── */
.item-wrap { border-top: 0.5px solid var(--bd-t); }
.item-row {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 14px; cursor: pointer; transition: background .1s;
}
.item-row:hover { background: var(--bg-s); }
.item-row.done { opacity: .55; }
.item-row.done .item-txt { text-decoration: line-through; color: var(--tx-s); }
.item-left { display: flex; align-items: flex-start; gap: 9px; flex: 1; min-width: 0; }

/* Checkbox */
.cb {
  width: 16px; height: 16px; border: 1.5px solid var(--bd-s);
  border-radius: 4px; flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; cursor: pointer;
}
.cb.chkd { background: var(--bg-ok); border-color: var(--bd-ok); }
.cb.chkd i { font-size: 11px; color: var(--tx-ok); }

.item-main { flex: 1; min-width: 0; }
.item-top  { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.item-txt  { font-size: 13px; color: var(--tx-p); line-height: 1.4; }
.tool-line { font-size: 11px; color: var(--tx-t); margin-top: 2px; }

/* Expand button */
.expand-btn {
  flex-shrink: 0; background: none; border: none;
  cursor: pointer; padding: 2px 4px; color: var(--tx-s);
  font-size: 14px; transition: transform .2s; margin-top: 1px;
  font-family: var(--font);
}
.expand-btn.open { transform: rotate(180deg); }

/* ─── Badges ─────────────────────────────────────────────── */
.badge {
  font-size: 10px; font-weight: 500; padding: 2px 7px;
  border-radius: 99px; white-space: nowrap; flex-shrink: 0;
}
.bc   { background: var(--bg-err);  color: var(--tx-err);  }
.bw   { background: var(--bg-warn); color: var(--tx-warn); }
.bo   { background: var(--bg-ok);   color: var(--tx-ok);   }
.ba   { background: var(--bg-info); color: var(--tx-info); }

/* ─── Detail panel ───────────────────────────────────────── */
.detail-panel {
  display: none;
  background: var(--bg-s);
  border-top: 0.5px solid var(--bd-t);
  padding: 12px 14px 14px 39px;
}
.detail-panel.open { display: block; }
.d-section {
  margin-bottom: 10px; padding-left: 10px;
  border-left: 2px solid transparent; border-radius: 0;
}
.d-section:last-child { margin-bottom: 0; }
.d-why { border-left-color: var(--bd-info); }
.d-sig { border-left-color: var(--bd-warn); }
.d-act { border-left-color: var(--bd-ok);   }
.d-label {
  font-size: 10px; font-weight: 500; color: var(--tx-s);
  text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px;
}
.d-why .d-label { color: var(--tx-info); }
.d-sig .d-label { color: var(--tx-warn); }
.d-act .d-label { color: var(--tx-ok);   }
.d-body  { font-size: 12px; color: var(--tx-p); line-height: 1.6; }
.d-list  { list-style: none; padding: 0; }
.d-list li {
  font-size: 12px; color: var(--tx-p); line-height: 1.55;
  padding: 2px 0 2px 14px; position: relative;
}
.d-list li::before { content: "›"; position: absolute; left: 2px; color: var(--tx-t); }

/* ─── Buttons ────────────────────────────────────────────── */
.btn {
  font-size: 12px; color: var(--tx-s); background: var(--bg-p);
  border: 0.5px solid var(--bd-t); border-radius: var(--radius);
  padding: 6px 13px; cursor: pointer; display: flex; align-items: center;
  gap: 5px; font-family: var(--font); transition: background .1s;
}
.btn:hover { background: var(--bg-t); }

/* ─── Legend ─────────────────────────────────────────────── */
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--tx-s); }

/* ─── Panel tabs ─────────────────────────────────────────── */
.panel { display: none; }
.panel.active { display: block; }

/* ─── Auto-reset notice ──────────────────────────────────── */
.notice {
  font-size: 11px; color: var(--tx-t); text-align: right;
  margin-bottom: .75rem;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div>
      <h1>SEO monitoring playbook</h1>
      <p id="dt-display"></p>
    </div>
    <div class="hdr-right">
      <button class="btn" onclick="resetTab()">
        <i class="ti ti-refresh" aria-hidden="true"></i> Reset tab
      </button>
    </div>
  </div>

  <div class="sum-grid">
    <div class="sum-c"><div class="sum-n" id="s-tot">0</div><div class="sum-l">Total items</div></div>
    <div class="sum-c"><div class="sum-n" id="s-dn">0</div><div class="sum-l">Checked off</div></div>
    <div class="sum-c"><div class="sum-n" id="s-cr">0</div><div class="sum-l">Critical left</div></div>
    <div class="sum-c"><div class="sum-n" id="s-pc">0%</div><div class="sum-l">Completion</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('d',this)">Daily</button>
    <button class="tab" onclick="switchTab('w',this)">Weekly</button>
    <button class="tab" onclick="switchTab('m',this)">Monthly</button>
  </div>

  <div class="legend">
    <div class="leg-item"><span class="badge bc">Critical</span> Fix/check immediately</div>
    <div class="leg-item"><span class="badge bw">Watch</span> Monitor closely</div>
    <div class="leg-item"><span class="badge bo">Opportunity</span> Ranking gain available</div>
    <div class="leg-item"><span class="badge ba">AI-specific</span> Priority for AI sites</div>
  </div>

  <div class="prog-row">
    <div class="prog-bg"><div class="prog-fill" id="pbar" style="width:0%"></div></div>
    <span class="prog-txt" id="ptxt">0 / 0 done</span>
  </div>

  <p class="notice">Progress auto-saves per day and resets each morning.</p>

  <div id="d" class="panel active"></div>
  <div id="w" class="panel"></div>
  <div id="m" class="panel"></div>

</div>

<script>
/* ================================================================
   DATA — add / edit your checklist items here.
   Each item requires:
     t       : string  — short label shown in the list
     b       : string  — badge type: "c" critical | "w" watch | "o" opportunity | "a" AI-specific
     tool    : string  — the tool or report to open for this check
     why     : string  — why this metric matters (shown in detail panel)
     signals : array   — threshold statements (bullet list)
     actions : array   — what to do when signals fire (bullet list)
   ================================================================ */
const DATA = {
  /* ── DAILY ──────────────────────────────────────────────── */
  d: [
    {
      icon: "ti-chart-bar", title: "Traffic & visibility",
      items: [
        {
          t: "Organic sessions vs yesterday & 7-day avg",
          b: "c", tool: "GA4 → Acquisition → Organic Search",
          why: "Organic traffic is your real-time revenue proxy. A sudden drop almost always traces to a ranking loss, algorithm update, or technical failure — all fixable if caught within 24 hours. Every day you miss it, competitors fill your vacated ranking positions.",
          signals: [
            "Drop >15% day-over-day: investigate immediately — check GSC for errors first",
            "Drop >30%: emergency response — verify site is accessible and robots.txt hasn't changed",
            "Consistent 3-day downward trend: likely algorithmic, not a one-time glitch",
            "Single-day spike then normal: tracking anomaly or social/viral burst, not SEO",
            "Segment by device: mobile-only drop = CWV or mobile usability issue"
          ],
          actions: [
            "15%+ drop: open GSC Coverage → look for new crawl errors introduced yesterday",
            "Check Google algorithm update calendar (SERoundtable, SearchEngineLand) for same date",
            "Run URL Inspection on your top 5 pages — confirm they're indexed and crawlable",
            "30%+ drop: load your homepage and top pages manually — if slow/broken, that's your cause",
            "If no errors found: compare keyword positions in GSC → look for a competitor surging past you"
          ]
        },
        {
          t: "Impressions & clicks in GSC (28-day rolling)",
          b: "w", tool: "GSC → Performance → Search results",
          why: "Impressions = how often you appear in SERPs even when nobody clicks. CTR (clicks ÷ impressions) reveals how compelling your listing is. Impressions rising but clicks flat means Google shows you but users prefer competitors — a title/meta problem, not a ranking problem.",
          signals: [
            "CTR below 2% for position 1–3: your title tag is losing to competitors' listings",
            "Impressions flat but position improving: you're ranking for very low-volume queries",
            "Impressions up >10% week-over-week: content expansion or freshness update is working",
            "Impressions dropping with stable positions: the queries themselves are losing search volume",
            "CTR suddenly drops with stable position: a featured snippet or AI Overview appeared above you"
          ],
          actions: [
            "Low CTR (<2%) on positions 1–3: rewrite title — add numbers, year, brackets, or a clear value proposition",
            "If Google rewrote your meta description: give Google better structured data to pull from",
            "Check SERP manually for that keyword: if AIO or featured snippet appeared, target the rich result format",
            "Impressions dropping: use GSC date comparison to find which queries lost impressions → check Google Trends for volume shift",
            "Clicks and impressions both growing: double down — create more content in those topic clusters"
          ]
        },
        {
          t: "Average position for top 20 keywords",
          b: "w", tool: "GSC → Performance → Queries (sort by position)",
          why: "The CTR cliff is steep: position 1 gets ~28% of clicks, position 3 gets ~10%, position 10 gets ~2.5%. A 2-spot drop from #1 to #3 can cut your traffic on that keyword by 65%. Tracking this daily catches rank fluctuations before they become permanent losses.",
          signals: [
            "Drop of 3+ positions: investigate the specific page — check for unintended content changes",
            "Drop from top 3 → positions 4–10: high urgency — this is the steepest CTR cliff",
            "Drop from page 1 → page 2: near-critical — CTR collapses from ~5% to under 1%",
            "Sudden +5 position gain: a competitor likely dropped — act fast to consolidate with stronger internal linking",
            "Fluctuating daily within ±2 positions: normal ranking dance — don't over-optimize"
          ],
          actions: [
            "3+ position drop: check if the page was recently edited → compare your page vs current #1 (word count, freshness, schema)",
            "New competitor appeared above you: analyze their content structure and match or exceed its depth",
            "Keyword dropped from page 1 to page 2: add internal links from your most authoritative pages using the target keyword as anchor",
            "Keyword gained: lock it in by expanding content depth and adding FAQ schema → improve internal linking to the page",
            "Multiple keywords dropping simultaneously: likely algorithm update or site-wide technical issue — run a full crawl"
          ]
        },
        {
          t: "CTR for pages in positions 1–5",
          b: "o", tool: "GSC → Performance → Pages (filter by position 1–5)",
          why: "CTR is the conversion rate of your search listing. Google uses click signals as a quality indicator — sustained low CTR on a high-ranking page can eventually cause a demotion. A well-crafted title that improves CTR from 3% to 6% literally doubles your traffic without any ranking change.",
          signals: [
            "Position 1 benchmark: 25–35% CTR. Below 20%: title underperforming",
            "Position 2 benchmark: 13–18%. Position 3: 9–12%",
            "Sudden CTR drop with same position: check if Google launched a featured snippet or AIO for that query",
            "CTR >50% above benchmark on any page: study that title — replicate the formula across similar pages",
            "Branded queries with low CTR: sitelinks may not be showing, or a reputation issue"
          ],
          actions: [
            "CTR below benchmark: rewrite title — add current year, specific numbers, or parenthetical value add like '(Complete Guide)'",
            "Run GSC date comparison to find when CTR dropped → check if SERP changed on that date",
            "If Google consistently rewrites your title in SERPs: align your H1 and structured data with the intended title",
            "Test different meta descriptions — include a clear CTA and the keyword naturally in the first sentence",
            "High impressions + low CTR is your highest-leverage SEO win: fixing it costs nothing and can yield 50–200% traffic lift"
          ]
        },
        {
          t: "AI Overview (SGE) presence for target queries",
          b: "a", tool: "Manual SERP checks + GSC Search appearance filter",
          why: "Google AI Overviews appear for roughly 15–20% of searches. For an AI site, these are your core traffic queries. An AIO appearing above your #1 ranking can reduce CTR by 50–70% even with no ranking change. Conversely, being cited inside an AIO is a massive authority signal.",
          signals: [
            "You rank #1 but traffic dropped: AIO likely appeared and is absorbing clicks — verify manually",
            "Your content is cited inside an AIO: strong E-E-A-T signal — protect and strengthen that page",
            "Competitors cited in AIO but not you: their content has structural or authority qualities yours lacks",
            "AIO appearing for your target queries but cites no AI-niche sites: content authority gap",
            "AIO content misrepresents your topic: Google is pulling from weaker sources — write the definitive answer"
          ],
          actions: [
            "Not cited in AIO: rewrite key sections as direct, authoritative answers in the first paragraph → add FAQ schema → build E-E-A-T signals",
            "AIO is absorbing your traffic: pivot toward transactional, tool-based, or long-tail conversational queries where AIO appears less",
            "AIO cites you: keep this page updated and fresh → add more structured data to increase citation frequency",
            "Monitor weekly which new queries gain AIO coverage → adjust content calendar to front-load AIO-resistant content types",
            "Check competitor AIO citations — what content format is Google pulling from? Match and exceed that structure"
          ]
        }
      ]
    },
    {
      icon: "ti-activity", title: "Technical health",
      items: [
        {
          t: "Site uptime & server response time",
          b: "c", tool: "UptimeRobot / Better Uptime + GTmetrix",
          why: "Google crawls your site continuously. Downtime or a slow TTFB during Googlebot visits creates crawl errors in GSC and reduces crawl frequency. Even 30 minutes of daily downtime compounds into reduced crawl budget over weeks, slowing content indexation and hurting freshness signals.",
          signals: [
            "Response time >2s: flag — user experience and crawl efficiency degrading",
            "TTFB (Time to First Byte) >600ms: server-side bottleneck — caching or hosting issue",
            "Any 5xx error: hard crawl failure — Googlebot cannot access your content",
            "Downtime >10 min/day recurring: hosting infrastructure problem requiring immediate upgrade",
            "Response time spike on specific pages only: likely an unoptimized database query or heavy script on those pages"
          ],
          actions: [
            "TTFB >600ms: enable server-side caching (Cloudflare, WP Rocket) → check if your hosting tier is underpowered",
            "Response time >2s: optimize images to WebP → defer non-critical JavaScript → enable a CDN",
            "5xx errors detected: check hosting control panel for server logs → if recurring, review recent deployments",
            "Downtime alert fires: verify via secondary tool → post status if >15 min → submit affected URLs for re-crawl in GSC after recovery",
            "If AI tool pages are slow but homepage is fast: it's a compute/rendering problem specific to dynamic content — consider edge caching or SSR"
          ]
        },
        {
          t: "New crawl errors in GSC Coverage report",
          b: "c", tool: "GSC → Indexing → Pages (filter by error type)",
          why: "Every GSC crawl error is a page Google tried to visit and failed. On key ranking pages, this can trigger a ranking drop within days. For AI sites with dynamic content or frequent deployments, crawl errors often spike right after code releases.",
          signals: [
            "Server error (5xx): Google cannot access your content — urgent",
            "'Blocked by robots.txt': check immediately if a key page was accidentally blocked",
            "'Submitted URL not found (404)': you're sending Googlebot to dead pages",
            "'Crawled – currently not indexed': Google visited but chose not to index — usually thin content",
            "'Discovered – currently not indexed': Google knows the page exists but hasn't crawled it — internal linking problem"
          ],
          actions: [
            "New 5xx errors: check server immediately → likely a post-deployment issue → resubmit after fix",
            "Blocked by robots.txt: audit your robots.txt immediately — a single misconfigured rule can block your entire site",
            "Submitted 404s: implement 301 redirects from old URLs to the most relevant live page → update sitemap",
            "Crawled but not indexed: improve content quality (add depth, original data, expert voice) → add internal links from high-authority pages",
            "Discovered not indexed: add internal links from already-indexed pages → manually submit via GSC URL Inspection"
          ]
        },
        {
          t: "Core Web Vitals status (LCP, INP, CLS)",
          b: "c", tool: "GSC → Experience → Core Web Vitals",
          why: "CWV is a confirmed Google ranking signal. For an AI site with chat interfaces and dynamic content, INP (interactivity) is your highest risk — JavaScript-heavy AI tools regularly fail this metric. Failing CWV on mobile disadvantages you in mobile SERPs, where most users now search.",
          signals: [
            "LCP: Good <2.5s | Needs improvement 2.5–4s | Poor >4s",
            "INP: Good <200ms | Needs improvement 200–500ms | Poor >500ms (AI sites commonly fail this)",
            "CLS: Good <0.1 | Needs improvement 0.1–0.25 | Poor >0.25",
            "Watch 'Poor URLs' count in GSC — even 5–10 poor mobile URLs drags your site-wide score",
            "Field data (real user data) in GSC matters more than lab data in PageSpeed Insights"
          ],
          actions: [
            "LCP failing: preload your largest above-fold element → serve images in WebP with explicit dimensions → enable HTTP/2",
            "INP failing: audit and defer non-critical third-party scripts → break up long JavaScript tasks (>50ms) → lazy-load AI tool widgets below the fold",
            "CLS failing: add explicit width and height to all images → avoid injecting content above existing elements → use CSS transform instead of top/left for animations",
            "After fixing, verify improvement in GSC field data (takes 28 days for the report to fully update)",
            "Test on real Android devices — iOS Chrome uses WebKit and may differ from Google's CWV measurement"
          ]
        },
        {
          t: "New 404 errors & internal broken links",
          b: "w", tool: "GSC → Indexing → Pages (Not found) + server logs",
          why: "Internal broken links waste crawl budget — Googlebot follows them and hits dead ends. High-traffic pages that become 404s can lose their entire ranking history within weeks. External links pointing to your 404 pages are wasted PageRank.",
          signals: [
            "Any 404 on a previously-ranking page: emergency — set a redirect immediately",
            "New 404s spiking after a deployment: likely a slug change or URL restructure that broke links",
            "High-DA external links pointing to 404 pages: you're losing PageRank — check Ahrefs Best by Links → filter 404",
            "More than 10 new 404s in one day: a recent site change broke URL structure",
            "Redirect chains (A → B → C): crawl budget waste — consolidate to direct 301s"
          ],
          actions: [
            "Newly discovered 404 on important page: implement 301 redirect to the most topically relevant live page immediately",
            "Find all inbound external links to 404 pages in Ahrefs → implement redirects to reclaim that PageRank",
            "Use Screaming Frog to find all internal links pointing to 404s → update them to correct URLs",
            "After any CMS deployment: immediately crawl your site to catch slug changes → never change a URL without setting a 301",
            "Redirect chains: update all A→B→C chains to A→C directly to eliminate crawl waste"
          ]
        },
        {
          t: "Sitemap accessibility & submission status",
          b: "w", tool: "GSC → Sitemaps + browser check: /sitemap.xml",
          why: "Your sitemap.xml is Google's navigation map to your content. For an AI site publishing frequently, a broken or outdated sitemap means new pages are discovered only through internal linking, slowing indexation by days or weeks.",
          signals: [
            "Sitemap returns anything other than HTTP 200: Googlebot cannot read it — fix immediately",

/* ================================================================
   STATE & PERSISTENCE
   State is keyed by date so it auto-resets each morning.
   ================================================================ */
const TODAY = new Date().toISOString().split('T')[0];
const STORAGE_KEY = `seo-dash-v1-${TODAY}`;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { d: {}, w: {}, m: {} };
  } catch (e) { return { d: {}, w: {}, m: {} }; }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

const state = loadState();
let cur = 'd';

/* ================================================================
   RENDERING
   ================================================================ */
function bClass(b) { return b==='c'?'bc':b==='w'?'bw':b==='o'?'bo':'ba'; }
function bLabel(b) { return b==='c'?'Critical':b==='w'?'Watch':b==='o'?'Opportunity':'AI-specific'; }

function buildPanel(tid) {
  const el = document.getElementById(tid);
  el.innerHTML = '';
  DATA[tid].forEach((cat, ci) => {
    const total = cat.items.length;
    const block = document.createElement('div');
    block.className = 'cat-block';
    block.innerHTML = `
      <div class="cat-hdr" onclick="toggleCat('${tid}',${ci})">
        <div class="cat-title"><i class="ti ${cat.icon}" aria-hidden="true"></i>${cat.title}</div>
        <div class="cat-right">
          <span class="cat-cnt" id="cc-${tid}-${ci}">0/${total}</span>
          <i class="ti ti-chevron-down chev open" id="chv-${tid}-${ci}" aria-hidden="true"></i>
        </div>
      </div>
      <div id="cb-${tid}-${ci}">
        ${cat.items.map((item, ii) => `
          <div class="item-wrap" id="iw-${tid}-${ci}-${ii}">
            <div class="item-row${state[tid][ci+'-'+ii]?' done':''}" id="ir-${tid}-${ci}-${ii}" onclick="expandItem('${tid}',${ci},${ii})">
              <div class="item-left">
                <div class="cb${state[tid][ci+'-'+ii]?' chkd':''}" id="ck-${tid}-${ci}-${ii}"
                  onclick="event.stopPropagation();toggle('${tid}',${ci},${ii})">
                  <i class="ti ti-check" aria-hidden="true" style="display:${state[tid][ci+'-'+ii]?'':'none'}"></i>
                </div>
                <div class="item-main">
                  <div class="item-top">
                    <span class="item-txt">${item.t}</span>
                    <span class="badge ${bClass(item.b)}">${bLabel(item.b)}</span>
                  </div>
                  <div class="tool-line"><i class="ti ti-tool" aria-hidden="true" style="font-size:11px;margin-right:3px"></i>${item.tool}</div>
                </div>
              </div>
              <button class="expand-btn" id="eb-${tid}-${ci}-${ii}"
                onclick="event.stopPropagation();expandItem('${tid}',${ci},${ii})"
                aria-label="Show details">
                <i class="ti ti-chevron-down" aria-hidden="true"></i>
              </button>
            </div>
            <div class="detail-panel" id="dp-${tid}-${ci}-${ii}">
              <div class="d-section d-why">
                <div class="d-label">Why monitor</div>
                <div class="d-body">${item.why}</div>
              </div>
              <div class="d-section d-sig">
                <div class="d-label">Key signals & thresholds</div>
                <ul class="d-list">${item.signals.map(s=>`<li>${s}</li>`).join('')}</ul>
              </div>
              <div class="d-section d-act">
                <div class="d-label">Action playbook</div>
                <ul class="d-list">${item.actions.map(a=>`<li>${a}</li>`).join('')}</ul>
              </div>
            </div>
          </div>`).join('')}
      </div>`;
    el.appendChild(block);
    updateCatCount(tid, ci);
  });
  updateProgress();
}

function expandItem(tid, ci, ii) {
  const dp = document.getElementById(`dp-${tid}-${ci}-${ii}`);
  const eb = document.getElementById(`eb-${tid}-${ci}-${ii}`);
  const open = dp.classList.contains('open');
  dp.classList.toggle('open', !open);
  eb.classList.toggle('open', !open);
}

function toggle(tid, ci, ii) {
  const key = `${ci}-${ii}`;
  state[tid][key] = !state[tid][key];
  const ir = document.getElementById(`ir-${tid}-${ci}-${ii}`);
  const ck = document.getElementById(`ck-${tid}-${ci}-${ii}`);
  const chk = ck.querySelector('i');
  if (state[tid][key]) {
    ir.classList.add('done'); ck.classList.add('chkd'); chk.style.display = '';
  } else {
    ir.classList.remove('done'); ck.classList.remove('chkd'); chk.style.display = 'none';
  }
  updateCatCount(tid, ci);
  updateProgress();
  saveState();
}

function toggleCat(tid, ci) {
  const body = document.getElementById(`cb-${tid}-${ci}`);
  const chv  = document.getElementById(`chv-${tid}-${ci}`);
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  chv.classList.toggle('open', hidden);
}

function updateCatCount(tid, ci) {
  const items = DATA[tid][ci].items;
  let done = 0;
  items.forEach((_, ii) => { if (state[tid][`${ci}-${ii}`]) done++; });
  document.getElementById(`cc-${tid}-${ci}`).textContent = `${done}/${items.length}`;
}

function updateProgress() {
  let total = 0, done = 0, critLeft = 0;
  DATA[cur].forEach((cat, ci) => {
    cat.items.forEach((item, ii) => {
      total++;
      if (state[cur][`${ci}-${ii}`]) done++;
      else if (item.b === 'c') critLeft++;
    });
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('ptxt').textContent = `${done} / ${total} done`;
  document.getElementById('s-tot').textContent = total;
  document.getElementById('s-dn').textContent  = done;
  document.getElementById('s-cr').textContent  = critLeft;
  document.getElementById('s-pc').textContent  = pct + '%';
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  cur = tab;
  updateProgress();
}

function resetTab() {
  state[cur] = {};
  DATA[cur].forEach((cat, ci) => {
    cat.items.forEach((_, ii) => {
      const ir = document.getElementById(`ir-${cur}-${ci}-${ii}`);
      const ck = document.getElementById(`ck-${cur}-${ci}-${ii}`);
      const dp = document.getElementById(`dp-${cur}-${ci}-${ii}`);
      const eb = document.getElementById(`eb-${cur}-${ci}-${ii}`);
      if (ir) ir.classList.remove('done');
      if (ck) { ck.classList.remove('chkd'); ck.querySelector('i').style.display = 'none'; }
      if (dp) dp.classList.remove('open');
      if (eb) eb.classList.remove('open');
    });
    updateCatCount(cur, ci);
  });
  updateProgress();
  saveState();
}
